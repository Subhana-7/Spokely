openapi: 3.0.3
info:
  title: Spokely API
  version: 1.0.0
servers:
  - url: http://localhost:5000
paths:
  /api/users:
    get:
      summary: Get all users
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    email:
                      type: string
